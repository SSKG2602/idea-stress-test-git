substitutions:
  _REGION: us-central1
  _BACKEND_SERVICE: idea-stress-backend
  _FRONTEND_SERVICE: idea-stress-frontend
  _AR_REPO: idea-stress-test
  _BACKEND_URL: https://YOUR_BACKEND_SERVICE_URL

steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: build-backend
    args:
      - build
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/backend:$COMMIT_SHA'
      - ./backend

  - name: 'gcr.io/cloud-builders/docker'
    id: build-frontend
    args:
      - build
      - -t
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/frontend:$COMMIT_SHA'
      - --build-arg
      - 'NEXT_PUBLIC_API_URL=${_BACKEND_URL}'
      - ./frontend

  - name: 'gcr.io/cloud-builders/docker'
    id: push-backend
    args: ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/backend:$COMMIT_SHA']
    waitFor: ['build-backend']

  - name: 'gcr.io/cloud-builders/docker'
    id: push-frontend
    args: ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/frontend:$COMMIT_SHA']
    waitFor: ['build-frontend']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-backend
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_BACKEND_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/backend:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --memory=1Gi
      - --cpu=1
      - --concurrency=4
      - --min-instances=0
      - --max-instances=3
      - --timeout=180
      - --cpu-boost
      - --set-secrets=GROQ_API_KEY=GROQ_API_KEY:latest,SERPER_API_KEY=SERPER_API_KEY:latest,DATABASE_URL=DATABASE_URL:latest,SECRET_KEY=SECRET_KEY:latest,HF_TOKEN=HF_TOKEN:latest
      - --set-env-vars=APP_ENV=production,MAX_CONCURRENT_ANALYSES=2,ANALYSIS_TIMEOUT_SECONDS=120,HF_HOME=/app/hf_cache
    waitFor: ['push-backend']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-frontend
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_FRONTEND_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/frontend:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --memory=256Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --timeout=60
    waitFor: ['push-frontend']

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/backend:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/frontend:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
