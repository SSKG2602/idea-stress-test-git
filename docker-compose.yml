services:
  backend:
    build:
      context: ./backend
      target: runtime           # use runtime stage; builder is CI only
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env          # copy .env.example → .env and fill in values
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/stresstest
      - APP_ENV=development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app          # hot-reload friendly in dev
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stresstest
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
